<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account · Training Schedule</title>
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">🏃</div>
    <h1>Create account</h1>
    <p class="auth-sub">Start planning your training today</p>

    <div id="flash-error" class="flash flash-error" style="display:none"></div>

    <form action="/auth/register" method="POST" class="auth-form">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" autocomplete="username" required placeholder="Your name" minlength="2" maxlength="50" />

      <label for="password">Password <span class="hint">(min 8 characters)</span></label>
      <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="••••••••" minlength="8" />

      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required placeholder="••••••••" />

      <button type="submit" class="btn-primary">Create account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="/auth/login">Sign in</a></p>
  </div>
  <script src="/js/flash.js"></script>
</body>
</html>
